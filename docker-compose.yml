version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: tasksphere_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - tasksphere_net

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: tasksphere_server
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGO_URI=mongodb://mongodb:27017/todo-list
    depends_on:
      - mongodb
    networks:
      - tasksphere_net

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:5000/api
    container_name: tasksphere_client
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - tasksphere_net

volumes:
  mongo_data:

networks:
  tasksphere_net:
    driver: bridge
